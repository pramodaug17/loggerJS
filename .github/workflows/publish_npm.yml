name: Publish NPM Package

on:
    push:
        branches: [master]

jobs:
    publish:
        runs-on: ubuntu-latest

        permissions:
          contents: write
          id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 24
                registry-url: https://registry.npmjs.org/
                # cache: pnpm
                # cache: "npm"          # enables only if lock file exists

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                version: 10.33.0
            
            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Package
              run: pnpm run build

            - name: Run Tests
              run: pnpm run test

            - name: Git configuration
              run: |
                git config --global user.name "Dak InfoSystems"
                git config --global user.email "pramod.aug.17@gmail.com"

            - name: Bump version
              run: | 
                npm version patch -m "release: %s"

            - name: Commit and Push Tag
              run: |
                git push origin master --follow-tags

            - name: Check version if already published
              id: version_check
              run: |
                PACKAGE_NAME=$(node -p "require('./package.json').name")
                PACKAGE_VERSION=$(node -p "require('./package.json').version")

                if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
                  echo "already_published=true" >> $GITHUB_OUTPUT
                else
                  echo "already_published=false" >> $GITHUB_OUTPUT
                fi

            - name: Publish to npm
              if: steps.version_check.outputs.already_published == 'false'
              run: npm publish --access public --provenance
              env:
                NODE_AUTH_TOKEN: ${{secrets.NPM_PUBLISH_AUTOMATION}}

            - name: Publish to npm
              if: steps.version_check.outputs.already_published == 'true'
              run: echo "Version is already published"
